<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- bootsrap css -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  
  </head>
  <body>
    <!-- Main content -->
    <section class="content">
      <div class="container-fluid">
        <div class="row">
          <!-- left column -->
          <div class="col-md-12">
            <!-- jquery validation -->
            <div class="card card-primary">
              <div class="card-header">
                <h3 class="card-title">
                  Quick Example <small>jQuery Validation</small>
                </h3>
              </div>
              <!-- /.card-header -->
              <!-- form start -->
              <form id="form">
                <div class="card-body">
                  <div class="form-group">
                    <label for="exampleInputEmail1">Email address</label>
                    <input
                      type="email"
                      name="email"
                      class="form-control"
                      id="exampleInputEmail1"
                      placeholder="Enter email"
                    />
                  </div>
                  <div class="form-group">
                    <label for="exampleInputPassword1">Password</label>
                    <input
                      type="password"
                      name="password"
                      class="form-control"
                      id="exampleInputPassword1"
                      placeholder="Password"
                    />
                  </div>
                  <div class="form-group mb-0">
                    <div class="custom-control custom-checkbox">
                      <input
                        type="checkbox"
                        name="terms"
                        class="custom-control-input"
                        id="exampleCheck1"
                      />
                      <label class="custom-control-label" for="exampleCheck1"
                        >I agree to the <a href="#">terms of service</a>.</label
                      >
                    </div>
                  </div>
                </div>
                <!-- /.card-body -->
                <div class="card-footer">
                  <button type="submit" class="btn btn-primary">Submit</button>
                </div>
              </form>
            </div>
            <!-- /.card -->
          </div>
          <!--/.col (left) -->
          <!-- right column -->
          <div class="col-md-6"></div>
          <!--/.col (right) -->
        </div>
        <!-- /.row -->
      </div>
      <!-- /.container-fluid -->
    </section>
    <!-- /.content -->

    <!-- jQuery -->
    <script src="formValidationScript/jquery.min.js"></script>

    <!-- bootsrap script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <!-- jquery-validation -->
    <script src="formValidationScript/additional-methods.min.js"></script>
    <script src="formValidationScript/jquery.validate.min.js"></script>
    <script>
      $(function () {
        // Add custom method for password validation
        $.validator.addMethod(
          "passwordRules",
          function (value, element) {
            var hasUpperCase = /[A-Z]/.test(value);
            var hasNumber = /[0-9]/.test(value);
            var hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(value);
            return hasUpperCase && hasNumber && hasSpecial;
          },
          "Password must contain at least one capital letter, one number, and one special character"
        );

        // Add custom method for letters only (name)
        $.validator.addMethod(
          "lettersOnly",
          function (value, element) {
            return this.optional(element) || /^[a-zA-Z\s]+$/.test(value);
          },
          "Please enter only letters"
        );

        // Add custom method for numbers only (phone)
        $.validator.addMethod(
          "numbersOnly",
          function (value, element) {
            return this.optional(element) || /^[0-9]+$/.test(value);
          },
          "Please enter only numbers"
        );

        // Add custom method for allowed email domains
        $.validator.addMethod(
          "allowedDomains",
          function (value, element) {
            var allowedDomains = ["gmail.com", "usm.edu.ph", "outlook.com"];
            var domain = value.split("@")[1];
            return allowedDomains.indexOf(domain) >= 0;
          },
          "Please use an email from: @gmail.com, @usm.edu.ph, or @outlook.com"
        );

        $.validator.setDefaults({
          submitHandler: function () {
            alert('Form submitted.')
          },
        });

        $("#form").validate({
          rules: {
            name: {
              required: true,
              lettersOnly: true,
            },
            phone: {
              required: true,
              numbersOnly: true,
              minlength: 11,
              maxlength: 11,
            },
            email: {
              required: true,
              email: true,
              allowedDomains: true,
            },
            password: {
              required: true,
              minlength: 5,
              passwordRules: true,
            },
            terms: {
              required: true,
            },
          },
          messages: {
            name: {
              required: "Please enter your name",
              lettersOnly: "Name should contain only letters",
            },
            phone: {
              required: "Please enter your phone number",
              numbersOnly: "Phone number should contain only numbers",
              minlength: "Phone number must be 11 digits",
              maxlength: "Phone number must be 11 digits",
            },
            email: {
              required: "Please enter an email address",
              email: "Please enter a valid email address format",
              allowedDomains:
                "Only @gmail.com, @usm.edu.ph, or @outlook.com emails are allowed",
            },
            password: {
              required: "Please provide a password",
              minlength: "Your password must be at least 5 characters long",
              passwordRules:
                "Password must contain at least one capital letter, one number, and one special character",
            },
            terms: "Please accept our terms",
          },
          errorElement: "span",
          errorPlacement: function (error, element) {
            error.addClass("invalid-feedback");
            element.closest(".form-group").append(error);
          },
          highlight: function (element, errorClass, validClass) {
            $(element).addClass("is-invalid");
          },
          unhighlight: function (element, errorClass, validClass) {
            $(element).removeClass("is-invalid");
            $(element).addClass("is-valid");
          },
        });
      });
    </script>
  </body>
</html>
